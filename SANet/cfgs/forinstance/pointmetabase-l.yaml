# Model Information
# GFLOPs     Params.(M)
#  1.98      2.738
# Throughput (ins./s): 187

model:
  NAME: BaseSeg
  encoder_args:
    NAME: PointMetaBaseEncoder
    blocks: [1, 3, 5, 3, 3]
    strides: [1, 4, 4, 4, 4]
    sa_layers: 1 
    sa_use_res: False 
    width: 32
    in_channels: 2
    expansion: 1
    radius: 0.4
    nsample: 16
    aggr_args:
      feature_type: 'dp_fj'
      reduction: 'max'
    group_args:
      NAME: 'ballquery'
      normalize_dp: True
    conv_args:
      order: conv-norm-act
    act_args:
      act: 'relu'
    norm_args:
      norm: 'bn'
  decoder_args:
    NAME: PointNextDecoder
  cls_args:
    NAME: SegHead
    num_classes: 3
    in_channels: null
    norm_args:
      norm: 'bn'

batch_size: 8
seed: 2425